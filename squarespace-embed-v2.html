<div id="sleflac-tracker" class="sleflac-tracker">
  <div class="sleflac-loading">Loading bill tracker&hellip;</div>
</div>

<style>
.sleflac-tracker {
  --navy: #1a2d4f;
  --navy-mid: #243d6b;
  --gold: #b8912a;
  --gold-light: #f0d896;
  --gold-pale: #fdf8ec;
  --paper: #faf8f4;
  --slate: #2d3142;
  --gray-100: #eeede9;
  --gray-300: #c8c6bf;
  --gray-500: #8a8880;
  --gray-700: #4a4845;
  --text: #1e1d1b;
  --radius: 6px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  color: var(--text);
  width: 100%;
  background: var(--paper);
  border: 1px solid var(--gray-100);
  border-radius: 12px;
  overflow: hidden;
  container-type: inline-size;
  container-name: sleflac;
}
.sleflac-tracker * { box-sizing: border-box; }

.sleflac-loading, .sleflac-error {
  text-align: center;
  padding: 2.5rem 1rem;
  color: var(--gray-500);
  font-size: 14px;
}
.sleflac-error { color: #8b1a1a; }

/* Header bar */
.sleflac-header {
  background: var(--navy);
  color: #fff;
  padding: 1.1rem 1.5rem;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 6px;
}
.sleflac-header-title {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 0.01em;
}
.sleflac-header-meta {
  font-size: 11.5px;
  color: var(--gold-light);
  letter-spacing: 0.02em;
}

/* Category section */
.sleflac-category-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gray-500);
  padding: 1.1rem 1.5rem 0.5rem;
  background: var(--paper);
}

/* Row layout */
.sleflac-row {
  display: grid;
  grid-template-columns: 7px minmax(60px, 100px) minmax(0, 1fr) auto;
  align-items: center;
  gap: 0;
  border-top: 1px solid var(--gray-100);
  background: #fff;
  transition: background 0.15s;
}
.sleflac-row:hover { background: var(--gold-pale); }
.sleflac-row.priority { background: var(--gold-pale); }
.sleflac-row.priority:hover { background: #fbf0d4; }

.sleflac-rail {
  align-self: stretch;
}

.sleflac-anchor {
  padding: 14px 12px;
  text-align: center;
  border-right: 1px solid var(--gray-100);
}
.sleflac-bill-code {
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--navy);
  line-height: 1.15;
}
.sleflac-state-code {
  display: block;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--gray-500);
  margin-top: 2px;
}

.sleflac-main {
  padding: 14px 18px;
  min-width: 0;
  overflow-wrap: break-word;
  word-break: normal;
}
.sleflac-bill-label {
  font-size: 14px;
  font-weight: 700;
  color: var(--slate);
  margin-bottom: 3px;
}
.sleflac-bill-summary {
  font-size: 12.5px;
  color: var(--gray-500);
  line-height: 1.5;
}
.sleflac-bill-meta-line {
  font-size: 11px;
  color: var(--gray-500);
  margin-top: 6px;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  align-items: center;
}
.sleflac-bill-meta-line > * + *::before {
  content: '\00b7';
  margin-right: 6px;
  color: var(--gray-300);
}
.sleflac-bill-meta-line a {
  color: var(--navy);
  font-weight: 600;
  text-decoration: none;
}
.sleflac-bill-meta-line a:hover { text-decoration: underline; }
.sleflac-priority-tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  color: var(--gold);
  font-weight: 700;
}

.sleflac-side {
  padding: 14px 18px;
  text-align: right;
  white-space: nowrap;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  justify-content: center;
  gap: 8px;
}
.sleflac-status-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: #fff;
}
.sleflac-take-action {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--navy);
  color: #fff;
  font-size: 12.5px;
  font-weight: 700;
  padding: 7px 16px;
  border-radius: var(--radius);
  border: none;
  cursor: pointer;
  text-decoration: none;
  white-space: nowrap;
  transition: background 0.15s;
}
.sleflac-take-action:hover { background: var(--navy-mid); }
.sleflac-row.priority .sleflac-take-action { background: var(--gold); }
.sleflac-row.priority .sleflac-take-action:hover { background: #a07820; }

/* Responsive: stack on narrow containers (container query, not viewport) */
@container sleflac (max-width: 640px) {
  .sleflac-row {
    grid-template-columns: 7px 1fr;
    grid-template-areas:
      "rail anchor"
      "rail main"
      "rail side";
  }
  .sleflac-anchor {
    grid-area: anchor;
    text-align: left;
    border-right: none;
    border-bottom: 1px solid var(--gray-100);
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding-bottom: 8px;
  }
  .sleflac-state-code { margin-top: 0; }
  .sleflac-main { grid-area: main; padding-top: 10px; }
  .sleflac-side {
    grid-area: side;
    text-align: left;
    align-items: flex-start;
    padding-top: 0;
  }
}

/* Fallback for browsers without container query support: also respond
   to viewport width so it's never worse than before */
@media (max-width: 640px) {
  .sleflac-row {
    grid-template-columns: 7px 1fr;
    grid-template-areas:
      "rail anchor"
      "rail main"
      "rail side";
  }
  .sleflac-anchor {
    grid-area: anchor;
    text-align: left;
    border-right: none;
    border-bottom: 1px solid var(--gray-100);
    display: flex;
    align-items: baseline;
    gap: 8px;
    padding-bottom: 8px;
  }
  .sleflac-state-code { margin-top: 0; }
  .sleflac-main { grid-area: main; padding-top: 10px; }
  .sleflac-side {
    grid-area: side;
    text-align: left;
    align-items: flex-start;
    padding-top: 0;
  }
}
</style>

<script>
(function () {
  var DATA_URL = 'https://resolute1950.github.io/SLEFLAC/bills.json';

  var STATUS_COLORS = {
    'Pending': '#8a8880',
    'Introduced': '#3c6fb0',
    'In Committee': '#3c6fb0',
    'Engrossed': '#b8912a',
    'Enrolled': '#6a4fb0',
    'Passed': '#1a5c3a',
    'Vetoed': '#8b1a1a',
    'Failed / Dead': '#8a8880',
    'Not found': '#c8c6bf',
    'Error': '#c8c6bf',
    'Unknown': '#c8c6bf'
  };

  function escapeHtml(v) {
    if (v == null || v === 'undefined' || v === 'null') return '';
    return String(v)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function renderRow(bill) {
    var color = STATUS_COLORS[bill.status_label] || '#8a8880';
    var rowClass = 'sleflac-row' + (bill.priority ? ' priority' : '');

    var lastAction = bill.last_action
      ? escapeHtml(bill.last_action_date) + ' &mdash; ' + escapeHtml(bill.last_action)
      : '';

    var billLink = bill.state_link || bill.legiscan_url;
    var billLinkHtml = billLink
      ? '<a href="' + escapeHtml(billLink) + '" target="_blank" rel="noopener">View bill text &#8599;</a>'
      : '';

    var metaLine = '';
    var metaParts = [];
    if (bill.priority) metaParts.push('<span class="sleflac-priority-tag">&#9733; Priority</span>');
    if (lastAction) metaParts.push('<span>' + lastAction + '</span>');
    if (billLinkHtml) metaParts.push('<span>' + billLinkHtml + '</span>');
    if (metaParts.length) metaLine = '<div class="sleflac-bill-meta-line">' + metaParts.join('') + '</div>';

    var TAKE_ACTION_BASE = 'https://resolute1950.github.io/SLEFLAC/take-action.html';
    var actionUrl = bill.email_template
      ? TAKE_ACTION_BASE + '?bill=' + encodeURIComponent(bill.bill_number || '') + '&state=' + encodeURIComponent(bill.state || '')
      : bill.advocacy_url;
    var actionBtn = actionUrl
      ? '<a class="sleflac-take-action" href="' + escapeHtml(actionUrl) + '" target="_blank" rel="noopener">Take action &rarr;</a>'
      : '';

    var stateCode = bill.state ? escapeHtml(bill.state) : '';
    var billCode = escapeHtml(bill.bill_number || '');

    return '' +
      '<div class="' + rowClass + '">' +
        '<div class="sleflac-rail" style="background:' + color + '"></div>' +
        '<div class="sleflac-anchor">' +
          '<div class="sleflac-bill-code">' + billCode + '</div>' +
          (stateCode ? '<span class="sleflac-state-code">' + stateCode + '</span>' : '') +
        '</div>' +
        '<div class="sleflac-main">' +
          '<div class="sleflac-bill-label">' + escapeHtml(bill.label || bill.title || '') + '</div>' +
          '<div class="sleflac-bill-summary">' + escapeHtml(bill.summary || '') + '</div>' +
          metaLine +
        '</div>' +
        '<div class="sleflac-side">' +
          '<span class="sleflac-status-badge" style="background:' + color + '">' + escapeHtml(bill.status_label || 'Unknown') + '</span>' +
          actionBtn +
        '</div>' +
      '</div>';
  }

  function render(data) {
    var container = document.getElementById('sleflac-tracker');
    var bills = (data && data.bills) || [];

    if (!bills.length) {
      container.innerHTML = '<div class="sleflac-error">No tracked bills found.</div>';
      return;
    }

    var byCategory = {};
    var order = [];
    bills.forEach(function (bill) {
      var cat = bill.category || 'Other';
      if (!byCategory[cat]) { byCategory[cat] = []; order.push(cat); }
      byCategory[cat].push(bill);
    });

    var generated = data.generated ? new Date(data.generated) : null;
    var updatedStr = generated ? generated.toLocaleString('en-US', { dateStyle: 'medium', timeStyle: 'short' }) : 'recently';

    var html = '' +
      '<div class="sleflac-header">' +
        '<div class="sleflac-header-title">State Legislative Tracker &mdash; Veteran-Related Bills</div>' +
        '<div class="sleflac-header-meta">Live via LegiScan &middot; updated ' + escapeHtml(updatedStr) + '</div>' +
      '</div>';

    order.forEach(function (cat) {
      html += '<div class="sleflac-category-title">' + escapeHtml(cat) + '</div>';
      byCategory[cat].forEach(function (bill) {
        html += renderRow(bill);
      });
    });

    container.innerHTML = html;
  }

  fetch(DATA_URL, { cache: 'no-store' })
    .then(function (res) {
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return res.json();
    })
    .then(render)
    .catch(function (err) {
      var container = document.getElementById('sleflac-tracker');
      container.innerHTML = '<div class="sleflac-error">Bill tracker is temporarily unavailable. Please check back later.</div>';
      console.warn('SLEFLAC tracker: failed to load bills.json', err);
    });
})();
</script>
